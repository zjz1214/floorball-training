{% extends "base.html" %}
{% block title %}{{ heading.title }} - 软曲校队训练手册{% endblock %}
{% block content %}
<h1>{{ heading.title }}</h1>
{{ content_html | safe }}

{% if sub_pages %}
<h2 style="margin-top: 32px;">本节内容</h2>
<div class="cards">
    {% for page in sub_pages %}
    <a class="card" href="{{ page.slug }}.html">
        <h3>{{ page.title }}</h3>
    </a>
    {% endfor %}
</div>
{% endif %}
{% endblock %}
